# Redis Deployment for Digital Bank
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-bank-redis
  namespace: digital-bank
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command: ["redis-server"]
          args:
            - "--appendonly"
            - "yes"
            - "--save"
            - "900"
            - "1"
            - "--save"
            - "300"
            - "10"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: digital-bank-redis
  namespace: digital-bank
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
