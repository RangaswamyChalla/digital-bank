# ARQ Worker Deployment for Digital Bank Background Jobs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-bank-worker
  namespace: digital-bank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digital-bank-worker
  template:
    metadata:
      labels:
        app: digital-bank-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/digital-bank/backend:latest
          command: ["python", "-m", "arq", "app.worker_config.WorkerSettings"]
          envFrom:
            - configMapRef:
                name: digital-bank-backend-config
            - secretRef:
                name: digital-bank-backend-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["python", "-c", "import asyncio; asyncio.run(asyncio.sleep(1))"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: digital-bank-worker
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: digital-bank-worker-config
  namespace: digital-bank
data:
  ENVIRONMENT: "production"
  REDIS_URL: "redis://digital-bank-redis:6379"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: digital-bank-worker-secrets
  namespace: digital-bank
type: Opaque
stringData:
  # Note: In production, use external secrets management
  DATABASE_URL: "postgresql://bankuser:bankpass@digital-bank-postgres:5432/bankdb"
  SECRET_KEY: "your-secret-key-here"
