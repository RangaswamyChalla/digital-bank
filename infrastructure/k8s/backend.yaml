# Digital Bank Backend - Kubernetes Configuration
# Alternative to Terraform for Kubernetes-based deployments

apiVersion: v1
kind: Namespace
metadata:
  name: digital-bank
  labels:
    app: digital-bank

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: digital-bank-backend-config
  namespace: digital-bank
data:
  ENVIRONMENT: "production"
  DATABASE_URL: "postgresql://user:pass@postgres:5432/bankdb"
  REDIS_URL: "redis://redis:6379"
  LOG_LEVEL: "INFO"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-bank-backend
  namespace: digital-bank
spec:
  replicas: 3
  selector:
    matchLabels:
      app: digital-bank-backend
  template:
    metadata:
      labels:
        app: digital-bank-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/digital-bank/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: digital-bank-backend-config
            - secretRef:
                name: digital-bank-backend-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: digital-bank-backend
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: digital-bank-backend-service
  namespace: digital-bank
spec:
  selector:
    app: digital-bank-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digital-bank-ingress
  namespace: digital-bank
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - digitalbank.example.com
      secretName: digital-bank-tls
  rules:
    - host: digitalbank.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: digital-bank-backend-service
                port:
                  number: 80
